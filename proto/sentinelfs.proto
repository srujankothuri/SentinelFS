syntax = "proto3";

package sentinelfs;

option go_package = "./proto";

// ──────────────────────────────────────────────
// Common Types
// ──────────────────────────────────────────────

message ChunkInfo {
  string chunk_id = 1;
  int32 chunk_index = 2;
  int64 size = 3;
  string checksum = 4;
  repeated string node_ids = 5; // nodes storing this chunk
}

message FileInfo {
  string path = 1;
  int64 size = 2;
  int32 chunk_count = 3;
  int32 replication_factor = 4;
  repeated ChunkInfo chunks = 5;
  int64 created_at = 6;
}

message NodeInfo {
  string node_id = 1;
  string address = 2;
  int64 capacity_bytes = 3;
  int64 used_bytes = 4;
  int32 chunk_count = 5;
  string status = 6;       // HEALTHY, WARNING, AT_RISK, CRITICAL, DEAD
  double risk_score = 7;
}

message HealthMetrics {
  string node_id = 1;
  double disk_io_latency_ms = 2;     // avg disk I/O latency
  double disk_utilization = 3;        // 0.0 - 1.0
  int64 error_count = 4;             // cumulative errors
  double response_time_ms = 5;       // avg gRPC response time
  double cpu_usage = 6;              // 0.0 - 1.0
  double memory_usage = 7;           // 0.0 - 1.0
  int64 timestamp = 8;              // unix millis
}

// ──────────────────────────────────────────────
// Metadata Service — Client ↔ MetaServer
// ──────────────────────────────────────────────

service MetadataService {
  // File operations
  rpc PutFile(PutFileRequest) returns (PutFileResponse);
  rpc GetFile(GetFileRequest) returns (GetFileResponse);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc GetFileInfo(GetFileInfoRequest) returns (GetFileInfoResponse);

  // Node management
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ReportHealth(ReportHealthRequest) returns (ReportHealthResponse);

  // Cluster info
  rpc GetClusterInfo(GetClusterInfoRequest) returns (GetClusterInfoResponse);
  rpc GetNodeInfo(GetNodeInfoRequest) returns (GetNodeInfoResponse);
}

// — File operation messages —

message PutFileRequest {
  string path = 1;
  int64 file_size = 2;
  int32 chunk_count = 3;
  string checksum = 4;
}

message ChunkPlacement {
  string chunk_id = 1;
  int32 chunk_index = 2;
  repeated string node_addresses = 3; // where to store this chunk
  repeated string node_ids = 4;
}

message PutFileResponse {
  bool success = 1;
  string message = 2;
  repeated ChunkPlacement placements = 3; // where to send each chunk
}

message GetFileRequest {
  string path = 1;
}

message GetFileResponse {
  bool success = 1;
  string message = 2;
  FileInfo file_info = 3;
  repeated ChunkLocation chunk_locations = 4;
}

message ChunkLocation {
  string chunk_id = 1;
  int32 chunk_index = 2;
  repeated string node_addresses = 3; // where to fetch from
  repeated string node_ids = 4;
}

message DeleteFileRequest {
  string path = 1;
}

message DeleteFileResponse {
  bool success = 1;
  string message = 2;
}

message ListFilesRequest {
  string path = 1;
}

message ListFilesResponse {
  bool success = 1;
  repeated FileInfo files = 2;
}

message GetFileInfoRequest {
  string path = 1;
}

message GetFileInfoResponse {
  bool success = 1;
  FileInfo file_info = 2;
}

// — Node management messages —

message RegisterNodeRequest {
  string address = 1;
  int64 capacity_bytes = 2;
}

message RegisterNodeResponse {
  bool success = 1;
  string node_id = 2;
  string message = 3;
}

message HeartbeatRequest {
  string node_id = 1;
  int64 used_bytes = 2;
  int32 chunk_count = 3;
}

message HeartbeatResponse {
  bool success = 1;
  repeated string chunks_to_delete = 2;  // cleanup commands
}

message ReportHealthRequest {
  HealthMetrics metrics = 1;
}

message ReportHealthResponse {
  bool success = 1;
  string status = 2; // current status assigned to node
}

// — Cluster info messages —

message GetClusterInfoRequest {}

message GetClusterInfoResponse {
  int32 total_nodes = 1;
  int32 healthy_nodes = 2;
  int32 warning_nodes = 3;
  int32 at_risk_nodes = 4;
  int32 dead_nodes = 5;
  int64 total_capacity = 6;
  int64 total_used = 7;
  int32 total_files = 8;
  int32 total_chunks = 9;
  repeated NodeInfo nodes = 10;
}

message GetNodeInfoRequest {
  string node_id = 1; // empty = all nodes
}

message GetNodeInfoResponse {
  repeated NodeInfo nodes = 1;
}

// ──────────────────────────────────────────────
// Data Node Service — Client/MetaServer ↔ DataNode
// ──────────────────────────────────────────────

service DataNodeService {
  rpc StoreChunk(StoreChunkRequest) returns (StoreChunkResponse);
  rpc GetChunk(GetChunkRequest) returns (GetChunkResponse);
  rpc DeleteChunk(DeleteChunkRequest) returns (DeleteChunkResponse);
  rpc TransferChunk(TransferChunkRequest) returns (TransferChunkResponse);
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
}

message StoreChunkRequest {
  string chunk_id = 1;
  bytes data = 2;
  string checksum = 3;
}

message StoreChunkResponse {
  bool success = 1;
  string message = 2;
}

message GetChunkRequest {
  string chunk_id = 1;
}

message GetChunkResponse {
  bool success = 1;
  bytes data = 2;
  string checksum = 3;
}

message DeleteChunkRequest {
  string chunk_id = 1;
}

message DeleteChunkResponse {
  bool success = 1;
  string message = 2;
}

// Node-to-node chunk transfer (used during migration)
message TransferChunkRequest {
  string chunk_id = 1;
  string target_address = 2; // destination node
}

message TransferChunkResponse {
  bool success = 1;
  string message = 2;
}

message GetHealthRequest {}

message GetHealthResponse {
  HealthMetrics metrics = 1;
}